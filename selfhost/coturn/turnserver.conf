# coturn TURN/STUN server for 3Minutes video calls.
#
# Opt-in: started only with the "turn" compose profile:
#     docker compose -f selfhost/docker-compose.yml --profile turn up -d
#
# The backend mints short-lived credentials with the SAME shared secret, so it
# MUST match the backend's TURN_SECRET env. Change it before going to prod.

listening-port=3478
tls-listening-port=5349
fingerprint

# REST-API / time-limited credentials (coturn "use-auth-secret" scheme).
use-auth-secret
static-auth-secret=CHANGE_ME_TURN_SECRET
realm=3minutes

# Relay port range that must be reachable from the internet (open these in your
# firewall / security group alongside 3478 udp+tcp).
min-port=49160
max-port=49200

# IMPORTANT for production: advertise the server's PUBLIC IP so relay candidates
# are reachable. Uncomment and set it (or pass via the compose command):
# external-ip=YOUR_PUBLIC_IP

no-cli
no-tlsv1
no-tlsv1_1
stale-nonce=600
